name: fetch-courses

# 로컬 IP가 학교 방화벽에 막히는 곳(kookmin)을 Actions 러너에서 수집한다.
# SchoolCourse는 비공개 별도 저장소라 체크아웃할 수 없으므로 actions_fetch/의
# 자체완결 스크립트를 사용하고, 산출물 xlsx는 actions_fetch/out/에 커밋해
# 로컬에서 SchoolCourse/data_26_2로 옮긴다.
# 26-2 강의 데이터가 등록되면 수집이 성공하도록 매일 1회 재시도한다.
on:
  workflow_dispatch:
  schedule:
    - cron: '30 21 * * *' # 매일 06:30 KST
  push:
    branches: [main]
    paths:
      - '.github/workflows/fetch.yml'
      - 'actions_fetch/**'

permissions:
  contents: write

concurrency:
  group: fetch-courses
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install
        working-directory: actions_fetch

      # 로그 API는 인증이 필요해 로컬에서 못 읽으므로 실행 로그를 out/에 남겨 함께 커밋한다.
      # --no-warnings: 로그에 PID가 섞여 실패 반복 시 무의미한 커밋이 생기는 것 방지
      - name: Run kookmin scraper
        run: |
          mkdir -p out
          set -o pipefail
          node --no-warnings scrap_kookmin.mjs 2>&1 | tee out/run-log.txt
        working-directory: actions_fetch

      - name: Commit results
        if: always()
        run: |
          git config user.name "sugang-bot"
          git config user.email "actions@users.noreply.github.com"
          git add actions_fetch/out
          if ! git diff --cached --quiet; then
            git commit -m "feat: actions fetch kookmin $(date -u +'%Y-%m-%dT%H:%MZ')"
            git pull --rebase origin main
            git push
          fi
