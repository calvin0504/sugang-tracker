name: fetch-courses

# 로컬 IP가 학교 방화벽에 막히는 곳(kookmin)을 Actions 러너에서 수집한다.
# SchoolCourse는 비공개 별도 저장소라 체크아웃할 수 없으므로 actions_fetch/의
# 자체완결 스크립트를 사용하고, 산출물 xlsx는 actions_fetch/out/에 커밋해
# 로컬에서 SchoolCourse/data_26_2로 옮긴다.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fetch.yml'
      - 'actions_fetch/**'

permissions:
  contents: write

concurrency:
  group: fetch-courses
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install
        working-directory: actions_fetch

      - name: Run kookmin scraper
        run: node scrap_kookmin.mjs
        working-directory: actions_fetch

      - name: Commit results
        run: |
          git config user.name "sugang-bot"
          git config user.email "actions@users.noreply.github.com"
          git add actions_fetch/out
          if ! git diff --cached --quiet; then
            git commit -m "feat: actions fetch kookmin $(date -u +'%Y-%m-%dT%H:%MZ')"
            git pull --rebase origin main
            git push
          fi
